<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Key</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#14141e;border:2px solid #6432e6;border-radius:16px;padding:40px;text-align:center;max-width:420px;width:90%}
h1{font-size:18px;color:#aaa;margin-bottom:8px}
.key{font-size:32px;font-weight:bold;color:#6432e6;letter-spacing:4px;margin:20px 0;font-family:'Courier New',monospace;user-select:all;word-break:break-all}
.copy-btn{background:#6432e6;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold;transition:background 0.2s}
.copy-btn:hover{background:#7a4af0}
.copy-btn:active{background:#5228c0}
.info{color:#666;font-size:12px;margin-top:16px}
.timer{color:#888;font-size:14px;margin-top:12px}
.discord{display:inline-block;background:#5865f2;color:#fff;text-decoration:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:bold;margin-top:16px;transition:background 0.2s}
.discord:hover{background:#6875f5}
.loading{color:#888;font-size:14px}
.error{color:#f55;font-size:14px}
</style>
</head>
<body>
<div class="card">
<h1>Your Key</h1>
<div class="key" id="key"><span class="loading">Generating...</span></div>
<button class="copy-btn" id="copyBtn" onclick="copyKey()" style="display:none">Copy Key</button>
<div class="timer" id="timer"></div>
<div class="info">Key valid for 24 hours | 1 key per device</div>
<a class="discord" href="https://discord.gg/W5fnGDPn4p" target="_blank">Join Discord</a>
</div>
<script>
const API_URL = "https://qzsmcubmougkmuhcghsu.supabase.co/functions/v1/generate-key";

async function fetchKey() {
    const urlParams = new URLSearchParams(window.location.search);
    const workinkToken = urlParams.get('token');

    if (!workinkToken) {
        document.getElementById('key').innerHTML = '<span class="error">u fucking retard, go through it again</span>';
        document.getElementById('timer').textContent = '';
        document.querySelector('.info').textContent = '';
        return;
    }

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ script_name: 'all', workink_token: workinkToken })
        });
        const data = await res.json();
        if (data.key) {
            document.getElementById('key').textContent = data.key;
            document.getElementById('copyBtn').style.display = 'inline-block';
            const exp = new Date(data.expires_at);
            function updateTimer() {
                const diff = exp - new Date();
                if (diff <= 0) { document.getElementById('timer').textContent = 'Key expired'; return; }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').textContent = 'Expires in ' + h + 'h ' + m + 'm ' + s + 's';
            }
            updateTimer();
            setInterval(updateTimer, 1000);
        } else {
            document.getElementById('key').innerHTML = '<span class="error">Failed to generate key</span>';
        }
    } catch (e) {
        document.getElementById('key').innerHTML = '<span class="error">Server error. Try again.</span>';
    }
}

function copyKey() {
    const key = document.getElementById('key').textContent;
    navigator.clipboard.writeText(key).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Key', 1500);
    });
}

fetchKey();
</script>
</body>
</html>
